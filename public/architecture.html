<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viessmann Loyalty — How it works</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --red:#ff3e17;--red-dark:#cc2900;--ink:#0f172a;--ink-soft:#475569;--ink-mute:#94a3b8;
    --bg:#f4f6fb;--card:#ffffff;--line:#e6e9f0;--line-2:#d6dbe6;
    --shadow-sm:0 1px 2px rgba(15,23,42,.06),0 1px 3px rgba(15,23,42,.05);
    --shadow-md:0 6px 16px rgba(15,23,42,.08),0 2px 6px rgba(15,23,42,.05);
    --shadow-lg:0 18px 40px rgba(15,23,42,.16);
    --c-input:#2563eb;--b-input:#eff6ff;--c-read:#0d9488;--b-read:#effdfa;--c-find:#4f46e5;--b-find:#eef2ff;
    --c-check:#d97706;--b-check:#fff8ec;--c-decide:#e11d48;--b-decide:#fff1f3;--c-reward:#16a34a;--b-reward:#f0fdf4;
    --c-output:#7c3aed;--b-output:#f5f3ff;--c-admin:#475569;--b-admin:#f1f5f9;--c-data:#0891b2;--b-data:#ecfeff;
    --ok:#16a34a;--bad:#e11d48;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:Inter,system-ui,-apple-system,sans-serif;color:var(--ink);background:var(--bg);
    -webkit-font-smoothing:antialiased;overflow:hidden;display:flex;flex-direction:column;height:100vh}

  .top{flex:0 0 auto;background:var(--card);border-bottom:1px solid var(--line);padding:12px 20px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;z-index:20}
  .brand{display:flex;align-items:center;gap:11px;min-width:0}
  .brand .logo{width:30px;height:30px;border-radius:8px;background:var(--red);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 8px rgba(255,62,23,.35)}
  .brand .logo svg{width:18px;height:18px;color:#fff}
  .brand .bt{font-size:15px;font-weight:700;letter-spacing:-.01em;line-height:1.1}
  .brand .bs{font-size:12px;color:var(--ink-mute);font-weight:500}
  .top .spacer{flex:1}
  .ctrls{display:flex;align-items:center;gap:8px}
  .btn{border:1px solid var(--line-2);background:var(--card);color:var(--ink-soft);height:36px;padding:0 12px;border-radius:9px;font-family:inherit;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:7px;cursor:pointer;transition:.15s;white-space:nowrap;text-decoration:none}
  .btn:hover{border-color:var(--ink-mute);color:var(--ink)}
  .btn svg{width:15px;height:15px}
  .btn.play{background:var(--red);border-color:var(--red);color:#fff;box-shadow:0 2px 8px rgba(255,62,23,.3)}
  .btn.play:hover{background:var(--red-dark);border-color:var(--red-dark);color:#fff}
  .btn.ghost{border-color:transparent;background:transparent}
  .zoom{display:flex;border:1px solid var(--line-2);border-radius:9px;overflow:hidden;background:var(--card)}
  .zoom button{width:34px;height:36px;border:none;background:transparent;cursor:pointer;color:var(--ink-soft);font-size:17px;display:flex;align-items:center;justify-content:center}
  .zoom button:hover{background:var(--bg)}
  .zoom button:not(:last-child){border-right:1px solid var(--line)}

  .flows{flex:0 0 auto;background:var(--card);border-bottom:1px solid var(--line);padding:0 20px;display:flex;gap:4px;overflow-x:auto;z-index:15;align-items:center}
  .flows::-webkit-scrollbar{height:0}
  .flow-tab{border:none;background:transparent;cursor:pointer;font-family:inherit;padding:12px 4px;margin-right:15px;font-size:14px;font-weight:600;color:var(--ink-mute);border-bottom:2.5px solid transparent;white-space:nowrap;transition:.15s;display:flex;align-items:center;gap:8px}
  .flow-tab .n{width:22px;height:22px;border-radius:6px;background:var(--bg);color:var(--ink-mute);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:.15s}
  .flow-tab:hover{color:var(--ink-soft)}
  .flow-tab.on{color:var(--ink);border-bottom-color:var(--red)}
  .flow-tab.on .n{background:var(--red);color:#fff}
  .flow-tab.over.on{border-bottom-color:var(--ink)} .flow-tab.over.on .n{background:var(--ink)}
  .flow-tab.real.on{border-bottom-color:var(--ok)} .flow-tab.real.bad.on{border-bottom-color:var(--bad)}
  .flow-tab.real .n{background:var(--b-reward);color:var(--ok)} .flow-tab.real.bad .n{background:var(--b-decide);color:var(--bad)}
  .flow-tab.real.on .n{background:var(--ok);color:#fff} .flow-tab.real.bad.on .n{background:var(--bad);color:#fff}
  .flow-div{width:1px;height:24px;background:var(--line);margin:0 13px 0 0;flex-shrink:0}

  .stage{flex:1;position:relative;overflow:hidden;min-height:0}
  .canvas{position:absolute;inset:0;overflow:hidden;cursor:grab;background-image:radial-gradient(circle at 1px 1px,#d8deea 1.1px,transparent 0);background-size:26px 26px}
  .canvas.grab{cursor:grabbing}
  .viewport{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform}
  .wires{position:absolute;top:0;left:0;overflow:visible;pointer-events:none}
  .wire{fill:none;stroke:#c4ccdb;stroke-width:2.5;transition:stroke .25s,stroke-width .25s}
  .wire.dashed{stroke-dasharray:6 7;stroke:#cbd5e1}
  .wire.flow{stroke:var(--red);stroke-width:3.5}
  .wire-lbl{font-family:Inter;font-size:11px;font-weight:600;fill:#94a3b8}
  .wire-lbl-bg{fill:var(--bg)}

  .node{position:absolute;width:234px;min-height:72px;background:var(--card);border:1.5px solid var(--line);border-radius:15px;box-shadow:var(--shadow-sm);padding:13px 15px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:transform .25s cubic-bezier(.34,1.4,.5,1),box-shadow .2s,border-color .2s}
  .node:hover{border-color:var(--line-2);box-shadow:var(--shadow-md);transform:translateY(-1px)}
  .node .ico{width:42px;height:42px;border-radius:11px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
  .node .ico svg{width:22px;height:22px}
  .node .tx{min-width:0;flex:1}
  .node .tt{font-size:14.5px;font-weight:700;line-height:1.2;letter-spacing:-.01em}
  .node .ss{font-size:12px;color:var(--ink-mute);margin-top:2px;line-height:1.25;font-weight:500}
  .node .info{position:absolute;top:9px;right:10px;font-size:10px;font-weight:700;color:var(--ink-mute);opacity:.5}
  .node .step-badge{position:absolute;top:-9px;left:-9px;width:24px;height:24px;border-radius:50%;background:var(--card);border:2px solid var(--line-2);color:var(--ink-mute);font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;transition:.2s;box-shadow:var(--shadow-sm)}
  .node.done .step-badge{background:#dcfce7;border-color:#86efac;color:#16a34a}
  .node.on .step-badge{background:var(--red);border-color:var(--red);color:#fff}
  .node[data-cat=input] .ico{background:var(--b-input);color:var(--c-input)} .node[data-cat=read] .ico{background:var(--b-read);color:var(--c-read)}
  .node[data-cat=find] .ico{background:var(--b-find);color:var(--c-find)} .node[data-cat=check] .ico{background:var(--b-check);color:var(--c-check)}
  .node[data-cat=decide] .ico{background:var(--b-decide);color:var(--c-decide)} .node[data-cat=reward] .ico{background:var(--b-reward);color:var(--c-reward)}
  .node[data-cat=output] .ico{background:var(--b-output);color:var(--c-output)} .node[data-cat=admin] .ico{background:var(--b-admin);color:var(--c-admin)}
  .node[data-cat=data] .ico{background:var(--b-data);color:var(--c-data)}
  .node.on{transform:scale(1.05);box-shadow:0 0 0 4px rgba(255,62,23,.16),var(--shadow-lg);border-color:var(--red)}
  .node.dim{opacity:.4}

  .token{position:absolute;width:18px;height:18px;border-radius:50%;background:var(--red);box-shadow:0 0 0 6px rgba(255,62,23,.18),0 0 16px 3px rgba(255,62,23,.55);transform:translate(-50%,-50%);transition:left .7s cubic-bezier(.5,0,.3,1),top .7s cubic-bezier(.5,0,.3,1);z-index:5;pointer-events:none;opacity:0}
  .token.show{opacity:1}
  .token::after{content:"";position:absolute;inset:-3px;border-radius:50%;border:2px solid var(--red);opacity:.5;animation:ring 1.1s ease-out infinite}
  @keyframes ring{from{transform:scale(.7);opacity:.6}to{transform:scale(1.9);opacity:0}}

  .caption{position:absolute;left:50%;bottom:22px;transform:translateX(-50%);background:rgba(15,23,42,.93);color:#fff;backdrop-filter:blur(8px);border-radius:14px;padding:12px 20px;display:flex;align-items:center;gap:15px;box-shadow:var(--shadow-lg);max-width:min(720px,92vw);z-index:10;opacity:0;transition:opacity .3s;pointer-events:none}
  .caption.show{opacity:1}
  .caption .cap-step{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#fca5a5;background:rgba(255,62,23,.18);padding:5px 9px;border-radius:7px;white-space:nowrap;flex-shrink:0}
  .caption .cap-t{font-size:15px;font-weight:700;line-height:1.2} .caption .cap-d{font-size:13px;color:#cbd5e1;margin-top:2px;line-height:1.35}

  .hint{position:absolute;top:14px;left:50%;transform:translateX(-50%);font-size:12px;color:var(--ink-mute);background:rgba(255,255,255,.85);backdrop-filter:blur(6px);border:1px solid var(--line);padding:6px 13px;border-radius:100px;z-index:8;font-weight:500;box-shadow:var(--shadow-sm)}
  .hint b{color:var(--ink-soft)}
  .legend{position:absolute;bottom:18px;left:18px;background:rgba(255,255,255,.92);backdrop-filter:blur(6px);border:1px solid var(--line);border-radius:11px;padding:11px 13px;z-index:8;box-shadow:var(--shadow-sm);max-width:230px}
  .legend .lt{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-mute);margin-bottom:8px}
  .legend .li{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--ink-soft);margin:0 10px 5px 0;font-weight:500}
  .legend .sw{width:11px;height:11px;border-radius:4px}

  .preview-card{position:absolute;top:16px;left:18px;width:188px;background:var(--card);border:1px solid var(--line);border-radius:13px;box-shadow:var(--shadow-md);z-index:9;overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s}
  .preview-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
  .preview-card .ph{padding:9px 12px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:7px}
  .preview-card .ph .dt{font-size:11px;font-weight:700;color:var(--ink)} .preview-card .ph .ds{font-size:10px;color:var(--ink-mute)}
  .preview-card .ph svg{width:15px;height:15px;color:var(--red);flex-shrink:0}
  .preview-card .pimg{position:relative;background:#f1f5f9}
  .preview-card .pimg img{width:100%;display:block}
  .preview-card .pimg .expand{position:absolute;bottom:7px;right:7px;background:rgba(15,23,42,.82);color:#fff;font-size:10px;font-weight:600;padding:4px 8px;border-radius:6px;display:flex;align-items:center;gap:5px}
  .preview-card .pimg .expand svg{width:11px;height:11px}

  .result-card{position:absolute;bottom:18px;right:18px;background:var(--card);border:1px solid var(--line);border-left:5px solid var(--rc,var(--ink-mute));border-radius:13px;box-shadow:var(--shadow-lg);z-index:9;padding:14px 18px;min-width:230px;opacity:0;transform:translateY(8px);transition:opacity .35s,transform .35s;pointer-events:none}
  .result-card.show{opacity:1;transform:none}
  .result-card.ok{--rc:var(--ok)} .result-card.bad{--rc:var(--bad)}
  .result-card .rh{display:flex;align-items:center;gap:9px;margin-bottom:8px}
  .result-card .rh .ri{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center}
  .result-card.ok .rh .ri{background:var(--b-reward);color:var(--ok)} .result-card.bad .rh .ri{background:var(--b-decide);color:var(--bad)}
  .result-card .rh .ri svg{width:18px;height:18px}
  .result-card .rh .rt{font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--rc)}
  .result-card .rbig{font-size:26px;font-weight:800;letter-spacing:-.02em;line-height:1} .result-card .rsub{font-size:12.5px;color:var(--ink-soft);margin-top:5px;font-weight:500}

  /* zoomable invoice lightbox */
  .lightbox{position:fixed;inset:0;background:rgba(15,23,42,.86);backdrop-filter:blur(4px);z-index:80;display:none;opacity:0;transition:opacity .2s}
  .lightbox.open{display:block;opacity:1}
  .lx-stage{position:absolute;inset:0;overflow:hidden;cursor:grab}
  .lx-stage.grab{cursor:grabbing}
  .lx-img{position:absolute;top:50%;left:50%;transform-origin:center;will-change:transform;max-width:none;border-radius:6px;box-shadow:0 30px 80px rgba(0,0,0,.5);background:#fff;user-select:none;-webkit-user-drag:none}
  .lx-bar{position:absolute;bottom:22px;left:50%;transform:translateX(-50%);display:flex;gap:6px;background:rgba(255,255,255,.96);border:1px solid var(--line);border-radius:10px;padding:5px;box-shadow:var(--shadow-lg);z-index:2}
  .lx-bar button{width:38px;height:36px;border:none;background:transparent;border-radius:7px;cursor:pointer;color:var(--ink-soft);font-size:16px;font-weight:600;display:flex;align-items:center;justify-content:center}
  .lx-bar button:hover{background:var(--bg);color:var(--ink)}
  .lx-bar .lx-rd{min-width:54px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--ink-mute)}
  .lx-close{position:absolute;top:18px;right:22px;color:#fff;font-size:30px;cursor:pointer;opacity:.85;z-index:2;line-height:1}
  .lx-hint{position:absolute;top:20px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.8);font-size:12px;font-weight:500;z-index:2}

  /* detail panel */
  .scrim{position:fixed;inset:0;background:rgba(15,23,42,.35);backdrop-filter:blur(2px);opacity:0;pointer-events:none;transition:.25s;z-index:40}
  .scrim.open{opacity:1;pointer-events:auto}
  .panel{position:fixed;top:0;right:0;width:min(460px,100vw);height:100vh;background:var(--card);box-shadow:var(--shadow-lg);transform:translateX(100%);transition:transform .34s cubic-bezier(.32,.72,0,1);z-index:50;display:flex;flex-direction:column}
  .panel.open{transform:none}
  .panel .ph{padding:24px 26px 20px;border-bottom:1px solid var(--line);position:relative}
  .panel .ph .close{position:absolute;top:18px;right:18px;width:32px;height:32px;border-radius:9px;border:1px solid var(--line);background:var(--card);cursor:pointer;color:var(--ink-mute);font-size:18px;display:flex;align-items:center;justify-content:center}
  .panel .ph .close:hover{color:var(--ink);border-color:var(--ink-mute)}
  .panel .ph .pico{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:14px}
  .panel .ph .pico svg{width:27px;height:27px}
  .panel .ph .pcat{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;margin-bottom:6px}
  .panel .ph h2{font-size:21px;font-weight:800;letter-spacing:-.02em;line-height:1.15}
  .panel .pb{padding:22px 26px;overflow-y:auto;flex:1}
  .panel .sec{margin-bottom:20px} .panel .sec:last-child{margin-bottom:0}
  .panel .sl{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-mute);margin-bottom:9px;display:flex;align-items:center;gap:7px}
  .panel .sl svg{width:14px;height:14px}
  .panel .sec.what p{font-size:16px;color:var(--ink);line-height:1.55}
  .panel .sec p{font-size:14.5px;line-height:1.6;color:var(--ink-soft)}
  .io{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .io .iocell{background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:11px 13px}
  .io .iocell .iol{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px;display:flex;align-items:center;gap:5px}
  .io .in .iol{color:var(--c-input)} .io .out .iol{color:var(--c-reward)}
  .io .iocell .iov{font-size:13px;line-height:1.5;color:var(--ink)} .io .iocell .iov code{font-family:ui-monospace,Menlo,monospace;font-size:11.5px;background:#eef2f7;padding:1px 4px;border-radius:4px}
  .formula{font-family:ui-monospace,Menlo,monospace;font-size:13px;line-height:1.7;background:#0f172a;color:#e2e8f0;border-radius:11px;padding:14px 16px;white-space:normal;word-break:break-word}
  .formula .hl{color:#fca5a5;font-weight:700} .formula .gn{color:#86efac} .formula b{color:#fff}
  .data{background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:14px 16px;font-size:14px;line-height:1.7;color:var(--ink)}
  .data b{font-weight:700} .data code{font-family:ui-monospace,Menlo,monospace;font-size:12.5px;background:#eef2f7;padding:1px 5px;border-radius:4px}
  .ex{background:#fffaf5;border:1px solid #ffe2d3;border-radius:12px;padding:13px 15px;font-size:14px;line-height:1.6;color:var(--ink-soft)} .ex b{color:var(--ink)}
  .tech{background:#0f172a;color:#cbd5e1;border-radius:12px;padding:13px 15px;font-size:12.5px;line-height:1.6}
  .tech code{font-family:ui-monospace,Menlo,monospace;font-size:11.5px;background:rgba(255,255,255,.12);color:#fff;padding:1px 5px;border-radius:4px} .tech b{color:#fff}
  .chk{list-style:none;margin:0;padding:0}
  .chk li{display:flex;gap:8px;align-items:flex-start;font-size:13.5px;line-height:1.5;padding:3px 0;color:var(--ink)}
  .chk li .ic{flex-shrink:0;width:16px;height:16px;margin-top:1px} .chk li.ok .ic{color:var(--ok)} .chk li.bad .ic{color:var(--bad)} .chk li.bad{font-weight:600}
  table.calc{width:100%;border-collapse:collapse;font-size:13px}
  table.calc th,table.calc td{text-align:right;padding:6px 8px;border-bottom:1px solid var(--line)}
  table.calc th:first-child,table.calc td:first-child{text-align:left}
  table.calc th{font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-mute);font-weight:700}
  table.calc td:last-child{font-weight:700;color:var(--ink)} table.calc tr.muted td{color:var(--ink-mute)}
  table.calc tr.tot td{border-top:2px solid var(--line-2);border-bottom:none;font-weight:800;padding-top:8px} table.calc tr.tot td:last-child{color:var(--ok)}
  .pnav{display:flex;gap:10px;padding:16px 26px;border-top:1px solid var(--line)}
  .pnav button{flex:1;height:42px;border:1px solid var(--line-2);background:var(--card);border-radius:10px;font-family:inherit;font-size:13px;font-weight:600;color:var(--ink-soft);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px}
  .pnav button:hover:not(:disabled){border-color:var(--ink-mute);color:var(--ink)} .pnav button:disabled{opacity:.4;cursor:default}
  .pnav button svg{width:15px;height:15px}

  /* overview */
  .overview{position:absolute;inset:0;overflow-y:auto;display:none;background:var(--bg)}
  .overview.show{display:block}
  .ov-wrap{max-width:1080px;margin:0 auto;padding:40px 32px 80px}
  .ov-hero{margin-bottom:34px}
  .ov-eyebrow{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--red);margin-bottom:12px}
  .ov-hero h1{font-size:38px;font-weight:800;letter-spacing:-.03em;line-height:1.08;margin-bottom:14px}
  .ov-hero p{font-size:17px;line-height:1.6;color:var(--ink-soft);max-width:780px}
  .ov-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:26px 0 40px}
  .ov-stat{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:18px 20px;box-shadow:var(--shadow-sm)}
  .ov-stat .v{font-size:26px;font-weight:800;letter-spacing:-.02em;color:var(--ink)}
  .ov-stat .l{font-size:12.5px;color:var(--ink-soft);margin-top:4px;font-weight:500;line-height:1.35}
  .ov-h{font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-mute);margin:34px 0 16px;display:flex;align-items:center;gap:10px}
  .ov-h::after{content:"";flex:1;height:1px;background:var(--line)}
  .ov-journey{background:var(--ink);border-radius:16px;padding:24px 26px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;box-shadow:var(--shadow-md)}
  .ov-jstep{display:flex;flex-direction:column;gap:4px;color:#fff;min-width:0;flex:1}
  .ov-jstep .jn{width:30px;height:30px;border-radius:9px;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center}
  .ov-jstep .jn svg{width:17px;height:17px;color:#fff}

// ============ ENGINE ============
const NW=234,NH=72,HG=104,VG=58,PAD=80;
const WF={
  flow:null,nodes:[],byId:{},scale:1,tx:0,ty:0,playing:false,idx:0,t1:null,t2:null,panelId:null,el:{},
  init(){
    ['canvas','viewport','wires','token','caption','capStep','capT','capD','legend','previewCard','resultCard','overview'].forEach(id=>this.el[id]=document.getElementById(id));
    this.buildTabs();this.buildLegend();this.bindControls();this.bindPan();this.LB.init();this.load('overview');
  },
  buildTabs(){
    const F=document.getElementById('flows');
    F.innerHTML=FLOWS.map(w=>{const cls='flow-tab'+(w.over?' over':'')+(w.real?' real':'')+(w.bad?' bad':'');return `<button class="${cls}" data-k="${w.key}"><span class="n">${w.tag||''}</span>${w.name}</button>`;}).join('');
    const tabs=[...F.querySelectorAll('.flow-tab')];
    const firstNumbered=tabs.find(t=>!t.classList.contains('over')&&!t.classList.contains('real'));
    if(firstNumbered){const d=document.createElement('span');d.className='flow-div';F.insertBefore(d,firstNumbered);}
    tabs.forEach(b=>b.onclick=()=>this.load(b.dataset.k));
  },
  buildLegend(){const cats=[['input','Start'],['read','Automatic'],['check','Safety check'],['decide','Decision'],['reward','Calculation'],['admin','Viessmann'],['output','Result']];
    this.el.legend.innerHTML='<div class="lt">What the colours mean</div>'+cats.map(([c,n])=>`<span class="li"><span class="sw" style="background:var(--c-${c})"></span>${n}</span>`).join('');},
  bindControls(){
    document.getElementById('playBtn').onclick=()=>this.togglePlay();
    document.getElementById('replayBtn').onclick=()=>{this.clearStates();this.startPlay();};
    document.getElementById('zoomIn').onclick=()=>this.zoomBy(1.2);
    document.getElementById('zoomOut').onclick=()=>this.zoomBy(1/1.2);
    document.getElementById('zoomFit').onclick=()=>this.fit();
    document.getElementById('pClose').onclick=()=>this.closePanel();
    document.getElementById('scrim').onclick=()=>this.closePanel();
    document.getElementById('pPrev').onclick=()=>this.panelStep(-1);
    document.getElementById('pNext').onclick=()=>this.panelStep(1);
    this.el.previewCard.onclick=()=>this.LB.open(this.flow&&this.flow.preview&&this.flow.preview.img);
    this.el.overview.addEventListener('click',e=>{const g=e.target.closest('[data-go]');if(g)this.load(g.dataset.go);});
    window.addEventListener('keydown',e=>{if(e.key==='Escape'){this.closePanel();this.LB.close();}});
  },
  bindPan(){
    const c=this.el.canvas;let sx,sy,stx,sty,drag=false;
    c.addEventListener('pointerdown',e=>{if(e.target.closest('.node')||e.target.closest('.preview-card')||e.target.closest('.result-card'))return;drag=true;sx=e.clientX;sy=e.clientY;stx=this.tx;sty=this.ty;c.classList.add('grab');try{c.setPointerCapture(e.pointerId)}catch(_){}});
    c.addEventListener('pointermove',e=>{if(!drag)return;this.tx=stx+(e.clientX-sx);this.ty=sty+(e.clientY-sy);this.apply();});
    c.addEventListener('pointerup',()=>{drag=false;c.classList.remove('grab');});
    /* mouse-wheel zoom intentionally disabled on the flow canvas */
  },
  load(key){
    const w=FLOWS.find(f=>f.key===key);if(!w)return;this.stopPlay();this.flow=w;this.idx=0;
    document.querySelectorAll('.flow-tab').forEach(b=>b.classList.toggle('on',b.dataset.k===key));
    // overview mode
    if(w.over){this.el.overview.innerHTML=w.html;this.el.overview.classList.add('show');this.el.canvas.style.display='none';
      document.getElementById('canvasCtrls').style.visibility='hidden';this.el.overview.scrollTop=0;return;}
    this.el.overview.classList.remove('show');this.el.canvas.style.display='';document.getElementById('canvasCtrls').style.visibility='';
    this.el.caption.classList.remove('show');this.el.token.classList.remove('show');this.el.resultCard.classList.remove('show');
    this.nodes=w.nodes.map(n=>({...n,x:PAD+n.col*(NW+HG),y:PAD+n.row*(NH+VG)}));
    this.byId={};this.nodes.forEach(n=>this.byId[n.id]=n);
    this.render();this.fit();
    if(w.preview){this.el.previewCard.style.display='';this.el.legend.style.display='none';
      document.getElementById('pvImg').src=w.preview.img;document.getElementById('pvTitle').textContent=w.preview.title;document.getElementById('pvSub').textContent=w.preview.sub;}
    else{this.el.previewCard.style.display='none';this.el.legend.style.display='';}
    if(w.result){const rc=this.el.resultCard;rc.className='result-card '+w.result.kind;
      document.getElementById('rcIco').innerHTML=ico(w.result.kind==='ok'?'trophy':'x');
      document.getElementById('rcTag').textContent=w.result.tag;document.getElementById('rcBig').textContent=w.result.big;document.getElementById('rcSub').textContent=w.result.sub;}
    clearTimeout(this._auto);this._auto=setTimeout(()=>this.startPlay(),650);
  },
  render(){
    const vp=this.el.viewport;vp.querySelectorAll('.node').forEach(n=>n.remove());
    let maxX=0,maxY=0;this.nodes.forEach(n=>{maxX=Math.max(maxX,n.x+NW);maxY=Math.max(maxY,n.y+NH);});
    this.worldW=maxX+PAD;this.worldH=maxY+PAD;
    const W=this.el.wires;W.setAttribute('width',this.worldW);W.setAttribute('height',this.worldH);
    let paths='';
    this.flow.edges.forEach(([a,b,o])=>{o=o||{};const A=this.byId[a],B=this.byId[b];if(!A||!B)return;
      const x1=A.x+NW,y1=A.y+NH/2,x2=B.x,y2=B.y+NH/2,dx=Math.max(40,(x2-x1)*0.5);
      paths+=`<path class="wire${o.dashed?' dashed':''}" data-a="${a}" data-b="${b}" d="M${x1},${y1} C${x1+dx},${y1} ${x2-dx},${y2} ${x2},${y2}"/>`;
      if(o.lbl){const mx=(x1+x2)/2,my=(y1+y2)/2;paths+=`<rect class="wire-lbl-bg" x="${mx-o.lbl.length*3.4-6}" y="${my-9}" width="${o.lbl.length*6.8+12}" height="18" rx="9"/><text class="wire-lbl" x="${mx}" y="${my+4}" text-anchor="middle">${o.lbl}</text>`;}
    });
    W.innerHTML=paths;
    this.nodes.forEach(n=>{const stepNo=this.flow.happy.indexOf(n.id);
      const d=document.createElement('div');d.className='node';d.dataset.id=n.id;d.dataset.cat=n.cat;d.style.left=n.x+'px';d.style.top=n.y+'px';
      d.innerHTML=(stepNo>=0?`<span class="step-badge">${stepNo+1}</span>`:'')+`<span class="info">ⓘ</span><div class="ico">${ico(n.icon)}</div><div class="tx"><div class="tt">${n.title}</div><div class="ss">${n.sub}</div></div>`;
      d.onclick=(e)=>{e.stopPropagation();this.openPanel(n.id);};vp.appendChild(d);});
    this.nodeEls={};vp.querySelectorAll('.node').forEach(el=>this.nodeEls[el.dataset.id]=el);
  },
  apply(){this.el.viewport.style.transform=`translate(${this.tx}px,${this.ty}px) scale(${this.scale})`;},
  fit(){const r=this.el.canvas.getBoundingClientRect();const cw=r.width||window.innerWidth,ch=(r.height||(window.innerHeight-160));
    const li=(this.flow&&this.flow.preview)?224:0;const aw=cw-li;
    const s=Math.min(aw/this.worldW,ch/this.worldH,1.15)*0.92;this.scale=s;this.tx=li+(aw-this.worldW*s)/2;this.ty=Math.max(16,(ch-this.worldH*s)/2);this.apply();},
  zoomBy(f){this.scale=Math.min(2.2,Math.max(.3,this.scale*f));this.apply();},
  togglePlay(){if(this.playing)this.stopPlay();else{if(this.idx>=this.flow.happy.length)this.clearStates();this.startPlay();}},
  setPlayBtn(p){document.getElementById('playBtn').innerHTML=p?'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg><span class="lbl">Pause</span>':'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg><span class="lbl">Play</span>';},
  startPlay(){if(!this.flow||this.flow.over)return;this.playing=true;this.setPlayBtn(true);if(this.idx>=this.flow.happy.length)this.idx=0;this.el.token.classList.add('show');this.tick();},
  stopPlay(){this.playing=false;this.setPlayBtn(false);clearTimeout(this.t1);clearTimeout(this.t2);},
  clearStates(){this.idx=0;Object.values(this.nodeEls||{}).forEach(el=>el.classList.remove('on','done','dim'));this.el.wires.querySelectorAll('.wire').forEach(w=>w.classList.remove('flow'));this.el.caption.classList.remove('show');this.el.token.classList.remove('show');this.el.resultCard.classList.remove('show');},
  tick(){const h=this.flow.happy;
    if(this.idx>=h.length){if(this.flow.result)this.el.resultCard.classList.add('show');
      this.t1=setTimeout(()=>{if(!this.playing)return;this.clearStates();this.el.token.classList.add('show');this.tick();},2600);return;}
    const id=h[this.idx],n=this.byId[id],el=this.nodeEls[id];
    if(this.idx>0){const prev=h[this.idx-1];this.nodeEls[prev]&&this.nodeEls[prev].classList.replace('on','done');const w=this.el.wires.querySelector(`.wire[data-a="${prev}"][data-b="${id}"]`);w&&w.classList.add('flow');}
    this.el.token.style.left=(n.x+NW/2)+'px';this.el.token.style.top=(n.y+NH/2)+'px';el&&el.classList.add('on');
    this.el.capStep.textContent=`Step ${this.idx+1} of ${h.length}`;this.el.capT.textContent=n.title;this.el.capD.textContent=n.note||n.what;this.el.caption.classList.add('show');
    this.idx++;this.t2=setTimeout(()=>{if(this.playing)this.tick();},this.idx===1?1000:1700);},
  sec(label,iconKey,inner){return `<div class="sec"><div class="sl">${ico(iconKey)}${label}</div>${inner}</div>`;},
  openPanel(id){this.stopPlay();const n=this.byId[id];if(!n)return;this.panelId=id;
    const cc=getComputedStyle(document.documentElement).getPropertyValue('--c-'+n.cat).trim();
    const bb=getComputedStyle(document.documentElement).getPropertyValue('--b-'+n.cat).trim();
    const pi=document.getElementById('pIco');pi.style.background=bb;pi.style.color=cc;pi.innerHTML=ico(n.icon);
    const pc=document.getElementById('pCat');pc.textContent=CATNAME[n.cat]||'';pc.style.color=cc;
    document.getElementById('pTitle').textContent=n.title;
    let h=`<div class="sec what"><div class="sl">${ico('eye')}What happens here</div><p>${n.what}</p></div>`;
    if(n.input||n.output)h+=this.sec('Input → Output','search',`<div class="io"><div class="iocell in"><div class="iol">▸ In</div><div class="iov">${n.input||'—'}</div></div><div class="iocell out"><div class="iol">▸ Out</div><div class="iov">${n.output||'—'}</div></div></div>`);
    if(n.formula)h+=this.sec('The formula','percent',`<div class="formula">${n.formula}</div>`);
    if(n.ex)h+=this.sec('Worked example','star',`<div class="ex">${n.ex}</div>`);
    if(n.data)h+=this.sec('From this invoice','receipt',`<div class="data">${n.data}</div>`);
    if(n.tech)h+=this.sec('Under the hood','filter',`<div class="tech">${n.tech}</div>`);
    document.getElementById('pBody').innerHTML=h;
    Object.values(this.nodeEls).forEach(el=>{el.classList.remove('on');el.classList.toggle('dim',el.dataset.id!==id);});
    this.nodeEls[id].classList.add('on');this.nodeEls[id].classList.remove('dim');
    const hi=this.flow.happy.indexOf(id);
    document.getElementById('pPrev').disabled=hi<=0;document.getElementById('pNext').disabled=hi<0||hi>=this.flow.happy.length-1;
    document.getElementById('scrim').classList.add('open');document.getElementById('panel').classList.add('open');},
  panelStep(dir){const hi=this.flow.happy.indexOf(this.panelId);if(hi<0)return;const ni=hi+dir;if(ni<0||ni>=this.flow.happy.length)return;this.openPanel(this.flow.happy[ni]);},
  closePanel(){document.getElementById('scrim').classList.remove('open');document.getElementById('panel').classList.remove('open');Object.values(this.nodeEls||{}).forEach(el=>el.classList.remove('dim'));},

  // ---- zoomable invoice lightbox ----
  LB:{
    s:1,x:0,y:0,el:{},
    init(){['lightbox','lxStage','lxImg','lxRd'].forEach(id=>this.el[id]=document.getElementById(id));
      document.getElementById('lxClose').onclick=()=>this.close();
      document.getElementById('lxIn').onclick=()=>this.zoom(1.25,null,null);
      document.getElementById('lxOut').onclick=()=>this.zoom(1/1.25,null,null);
      document.getElementById('lxReset').onclick=()=>{this.s=1;this.x=0;this.y=0;this.apply();};
      this.el.lightbox.addEventListener('wheel',e=>{e.preventDefault();this.zoom(e.deltaY<0?1.15:1/1.15,e.clientX,e.clientY);},{passive:false});
      let dx,dy,ox,oy,drag=false;const st=this.el.lxStage;
      st.addEventListener('pointerdown',e=>{drag=true;dx=e.clientX;dy=e.clientY;ox=this.x;oy=this.y;st.classList.add('grab');try{st.setPointerCapture(e.pointerId)}catch(_){}});
      st.addEventListener('pointermove',e=>{if(!drag)return;this.x=ox+(e.clientX-dx);this.y=oy+(e.clientY-dy);this.apply();});
      st.addEventListener('pointerup',()=>{drag=false;st.classList.remove('grab');});
      this.el.lxImg.addEventListener('dblclick',()=>{this.s=this.s>1.2?1:2.2;this.apply();});
    },
    open(src){if(!src)return;this.el.lxImg.src=src;this.s=1;this.x=0;this.y=0;this.apply();this.el.lightbox.classList.add('open');},
    close(){this.el.lightbox.classList.remove('open');},
    zoom(f,cx,cy){const r=this.el.lxStage.getBoundingClientRect();
      if(cx==null){cx=r.left+r.width/2;cy=r.top+r.height/2;}
      const ns=Math.min(6,Math.max(.4,this.s*f)),k=ns/this.s;
      const px=cx-r.left-r.width/2,py=cy-r.top-r.height/2;
      this.x=px-(px-this.x)*k;this.y=py-(py-this.y)*k;this.s=ns;this.apply();},
    apply(){this.el.lxImg.style.transform=`translate(calc(-50% + ${this.x}px), calc(-50% + ${this.y}px)) scale(${this.s})`;this.el.lxRd.textContent=Math.round(this.s*100)+'%';}
  }
};
window.addEventListener('resize',()=>{if(WF.flow&&!WF.flow.over)WF.fit();});
WF.init();
</script>
