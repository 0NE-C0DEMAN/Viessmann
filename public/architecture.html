<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viessmann Loyalty — How it works</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --red:#ff3e17; --red-dark:#cc2900;
    --ink:#0f172a; --ink-soft:#475569; --ink-mute:#94a3b8;
    --bg:#f4f6fb; --card:#ffffff; --line:#e6e9f0; --line-2:#d6dbe6;
    --shadow-sm:0 1px 2px rgba(15,23,42,.06), 0 1px 3px rgba(15,23,42,.05);
    --shadow-md:0 6px 16px rgba(15,23,42,.08), 0 2px 6px rgba(15,23,42,.05);
    --shadow-lg:0 18px 40px rgba(15,23,42,.16);
    /* category colours */
    --c-input:#2563eb;  --b-input:#eff6ff;
    --c-read:#0d9488;   --b-read:#effdfa;
    --c-find:#4f46e5;   --b-find:#eef2ff;
    --c-check:#d97706;  --b-check:#fff8ec;
    --c-decide:#e11d48; --b-decide:#fff1f3;
    --c-reward:#16a34a; --b-reward:#f0fdf4;
    --c-output:#7c3aed; --b-output:#f5f3ff;
    --c-admin:#475569;  --b-admin:#f1f5f9;
    --c-data:#0891b2;   --b-data:#ecfeff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:Inter,system-ui,-apple-system,sans-serif;
    color:var(--ink); background:var(--bg);
    -webkit-font-smoothing:antialiased; overflow:hidden;
    display:flex; flex-direction:column; height:100vh;
  }

  /* ---------- top bar ---------- */
  .top{
    flex:0 0 auto; background:var(--card); border-bottom:1px solid var(--line);
    padding:12px 20px; display:flex; align-items:center; gap:18px; flex-wrap:wrap;
    z-index:20;
  }
  .brand{display:flex; align-items:center; gap:11px; min-width:0}
  .brand .logo{
    width:30px;height:30px;border-radius:8px;background:var(--red);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
    box-shadow:0 2px 8px rgba(255,62,23,.35);
  }
  .brand .logo svg{width:18px;height:18px;color:#fff}
  .brand .bt{font-size:15px;font-weight:700;letter-spacing:-.01em;line-height:1.1}
  .brand .bs{font-size:12px;color:var(--ink-mute);font-weight:500}
  .top .spacer{flex:1}
  .ctrls{display:flex;align-items:center;gap:8px}
  .btn{
    border:1px solid var(--line-2); background:var(--card); color:var(--ink-soft);
    height:36px;padding:0 12px;border-radius:9px;font-family:inherit;font-size:13px;font-weight:600;
    display:inline-flex;align-items:center;gap:7px;cursor:pointer;transition:.15s;white-space:nowrap;
  }
  .btn:hover{border-color:var(--ink-mute);color:var(--ink)}
  .btn svg{width:15px;height:15px}
  .btn.play{background:var(--red);border-color:var(--red);color:#fff;box-shadow:0 2px 8px rgba(255,62,23,.3)}
  .btn.play:hover{background:var(--red-dark);border-color:var(--red-dark);color:#fff}
  .zoom{display:flex;border:1px solid var(--line-2);border-radius:9px;overflow:hidden;background:var(--card)}
  .zoom button{width:34px;height:36px;border:none;background:transparent;cursor:pointer;color:var(--ink-soft);font-size:17px;display:flex;align-items:center;justify-content:center}
  .zoom button:hover{background:var(--bg)}
  .zoom button:not(:last-child){border-right:1px solid var(--line)}

  /* ---------- workflow tabs ---------- */
  .flows{
    flex:0 0 auto; background:var(--card); border-bottom:1px solid var(--line);
    padding:0 20px; display:flex; gap:6px; overflow-x:auto; z-index:15;
  }
  .flows::-webkit-scrollbar{height:0}
  .flow-tab{
    border:none;background:transparent;cursor:pointer;font-family:inherit;
    padding:13px 4px;margin-right:18px;font-size:14px;font-weight:600;color:var(--ink-mute);
    border-bottom:2.5px solid transparent;white-space:nowrap;transition:.15s;display:flex;align-items:center;gap:8px;
  }
  .flow-tab .n{width:22px;height:22px;border-radius:6px;background:var(--bg);color:var(--ink-mute);
    font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:.15s}
  .flow-tab:hover{color:var(--ink-soft)}
  .flow-tab.on{color:var(--ink);border-bottom-color:var(--red)}
  .flow-tab.on .n{background:var(--red);color:#fff}

  /* ---------- stage ---------- */
  .stage{flex:1;position:relative;overflow:hidden;min-height:0}
  .canvas{position:absolute;inset:0;overflow:hidden;cursor:grab;
    background-image:radial-gradient(circle at 1px 1px, #d8deea 1.1px, transparent 0);
    background-size:26px 26px;}
  .canvas.grab{cursor:grabbing}
  .viewport{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform}
  .wires{position:absolute;top:0;left:0;overflow:visible;pointer-events:none}
  .wire{fill:none;stroke:#c4ccdb;stroke-width:2.5;transition:stroke .25s, stroke-width .25s}
  .wire.dashed{stroke-dasharray:6 7;stroke:#cbd5e1}
  .wire.flow{stroke:var(--red);stroke-width:3.5}
  .wire-lbl{font-family:Inter;font-size:11px;font-weight:600;fill:#94a3b8}
  .wire-lbl-bg{fill:var(--bg)}

  /* node card */
  .node{
    position:absolute; width:230px; min-height:72px; background:var(--card);
    border:1.5px solid var(--line); border-radius:15px; box-shadow:var(--shadow-sm);
    padding:13px 15px; display:flex; align-items:center; gap:12px; cursor:pointer;
    transition:transform .25s cubic-bezier(.34,1.4,.5,1), box-shadow .2s, border-color .2s;
  }
  .node:hover{border-color:var(--line-2);box-shadow:var(--shadow-md);transform:translateY(-1px)}
  .node .ico{width:42px;height:42px;border-radius:11px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
  .node .ico svg{width:22px;height:22px}
  .node .tx{min-width:0;flex:1}
  .node .tt{font-size:14.5px;font-weight:700;line-height:1.2;letter-spacing:-.01em}
  .node .ss{font-size:12px;color:var(--ink-mute);margin-top:2px;line-height:1.25;font-weight:500}
  .node .step-badge{position:absolute;top:-9px;left:-9px;width:24px;height:24px;border-radius:50%;
    background:var(--card);border:2px solid var(--line-2);color:var(--ink-mute);font-size:11px;font-weight:800;
    display:flex;align-items:center;justify-content:center;transition:.2s;box-shadow:var(--shadow-sm)}
  .node.done .step-badge{background:#dcfce7;border-color:#86efac;color:#16a34a}
  .node.on .step-badge{background:var(--red);border-color:var(--red);color:#fff}
  /* category colour on the icon tile + active ring */
  .node[data-cat=input]  .ico{background:var(--b-input); color:var(--c-input)}
  .node[data-cat=read]   .ico{background:var(--b-read);  color:var(--c-read)}
  .node[data-cat=find]   .ico{background:var(--b-find);  color:var(--c-find)}
  .node[data-cat=check]  .ico{background:var(--b-check); color:var(--c-check)}
  .node[data-cat=decide] .ico{background:var(--b-decide);color:var(--c-decide)}
  .node[data-cat=reward] .ico{background:var(--b-reward);color:var(--c-reward)}
  .node[data-cat=output] .ico{background:var(--b-output);color:var(--c-output)}
  .node[data-cat=admin]  .ico{background:var(--b-admin); color:var(--c-admin)}
  .node[data-cat=data]   .ico{background:var(--b-data);  color:var(--c-data)}
  .node.on{transform:scale(1.05);box-shadow:0 0 0 4px rgba(255,62,23,.16), var(--shadow-lg);border-color:var(--red)}
  .node.dim{opacity:.4}

  /* travelling token */
  .token{position:absolute;width:18px;height:18px;border-radius:50%;background:var(--red);
    box-shadow:0 0 0 6px rgba(255,62,23,.18), 0 0 16px 3px rgba(255,62,23,.55);
    transform:translate(-50%,-50%);transition:left .7s cubic-bezier(.5,0,.3,1), top .7s cubic-bezier(.5,0,.3,1);
    z-index:5;pointer-events:none;opacity:0}
  .token.show{opacity:1}
  .token::after{content:"";position:absolute;inset:-3px;border-radius:50%;border:2px solid var(--red);
    opacity:.5;animation:ring 1.1s ease-out infinite}
  @keyframes ring{from{transform:scale(.7);opacity:.6}to{transform:scale(1.9);opacity:0}}

  /* caption bar */
  .caption{
    position:absolute;left:50%;bottom:22px;transform:translateX(-50%);
    background:rgba(15,23,42,.92);color:#fff;backdrop-filter:blur(8px);
    border-radius:14px;padding:12px 20px;display:flex;align-items:center;gap:15px;
    box-shadow:var(--shadow-lg);max-width:min(680px,92vw);z-index:10;
    opacity:0;transition:opacity .3s, transform .3s;pointer-events:none;
  }
  .caption.show{opacity:1}
  .caption .cap-step{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
    color:#fca5a5;background:rgba(255,62,23,.18);padding:5px 9px;border-radius:7px;white-space:nowrap;flex-shrink:0}
  .caption .cap-tx{min-width:0}
  .caption .cap-t{font-size:15px;font-weight:700;line-height:1.2}
  .caption .cap-d{font-size:13px;color:#cbd5e1;margin-top:2px;line-height:1.35}

  .hint{position:absolute;top:14px;left:50%;transform:translateX(-50%);font-size:12px;color:var(--ink-mute);
    background:rgba(255,255,255,.85);backdrop-filter:blur(6px);border:1px solid var(--line);
    padding:6px 13px;border-radius:100px;z-index:8;font-weight:500;box-shadow:var(--shadow-sm)}
  .hint b{color:var(--ink-soft)}

  /* legend */
  .legend{position:absolute;bottom:18px;left:18px;background:rgba(255,255,255,.9);backdrop-filter:blur(6px);
    border:1px solid var(--line);border-radius:11px;padding:11px 13px;z-index:8;box-shadow:var(--shadow-sm);max-width:220px}
  .legend .lt{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-mute);margin-bottom:8px}
  .legend .li{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--ink-soft);margin:0 10px 5px 0;font-weight:500}
  .legend .sw{width:11px;height:11px;border-radius:4px}

  /* ---------- detail panel ---------- */
  .scrim{position:fixed;inset:0;background:rgba(15,23,42,.35);backdrop-filter:blur(2px);opacity:0;pointer-events:none;transition:.25s;z-index:40}
  .scrim.open{opacity:1;pointer-events:auto}
  .panel{position:fixed;top:0;right:0;width:min(420px,100vw);height:100vh;background:var(--card);
    box-shadow:var(--shadow-lg);transform:translateX(100%);transition:transform .34s cubic-bezier(.32,.72,0,1);z-index:50;
    display:flex;flex-direction:column}
  .panel.open{transform:none}
  .panel .ph{padding:26px 26px 22px;border-bottom:1px solid var(--line);position:relative}
  .panel .ph .close{position:absolute;top:18px;right:18px;width:32px;height:32px;border-radius:9px;border:1px solid var(--line);
    background:var(--card);cursor:pointer;color:var(--ink-mute);font-size:18px;display:flex;align-items:center;justify-content:center}
  .panel .ph .close:hover{color:var(--ink);border-color:var(--ink-mute)}
  .panel .ph .pico{width:54px;height:54px;border-radius:15px;display:flex;align-items:center;justify-content:center;margin-bottom:15px}
  .panel .ph .pico svg{width:28px;height:28px}
  .panel .ph .pcat{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;margin-bottom:6px}
  .panel .ph h2{font-size:22px;font-weight:800;letter-spacing:-.02em;line-height:1.15}
  .panel .pb{padding:24px 26px;overflow-y:auto;flex:1}
  .panel .sec{margin-bottom:24px}
  .panel .sec:last-child{margin-bottom:0}
  .panel .sl{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-mute);margin-bottom:9px;display:flex;align-items:center;gap:7px}
  .panel .sl svg{width:14px;height:14px}
  .panel .sec p{font-size:15px;line-height:1.6;color:var(--ink-soft)}
  .panel .sec.what p{font-size:16px;color:var(--ink);line-height:1.55}
  .panel .ex{background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:14px 16px;font-size:14px;line-height:1.55;color:var(--ink-soft)}
  .panel .ex b{color:var(--ink);font-weight:700}
  .pnav{display:flex;gap:10px;padding:18px 26px;border-top:1px solid var(--line)}
  .pnav button{flex:1;height:42px;border:1px solid var(--line-2);background:var(--card);border-radius:10px;font-family:inherit;
    font-size:13px;font-weight:600;color:var(--ink-soft);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px}
  .pnav button:hover:not(:disabled){border-color:var(--ink-mute);color:var(--ink)}
  .pnav button:disabled{opacity:.4;cursor:default}
  .pnav button svg{width:15px;height:15px}

  @media (max-width:640px){
    .brand .bs{display:none}
    .legend{display:none}
    .hint{font-size:11px;padding:5px 10px}
    .caption{bottom:14px;padding:10px 15px}
    .ctrls .lbl{display:none}
  }
</style>
</head>
<body>

<div class="top">
  <div class="brand">
    <span class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 4l9 16 9-16"/></svg></span>
    <div>
      <div class="bt">Viessmann Loyalty</div>
      <div class="bs">How it works — a quick visual tour</div>
    </div>
  </div>
  <div class="spacer"></div>
  <div class="ctrls">
    <button class="btn play" id="playBtn"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg><span class="lbl">Play</span></button>
    <button class="btn" id="replayBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg><span class="lbl">Replay</span></button>
    <div class="zoom">
      <button id="zoomOut" title="Zoom out">−</button>
      <button id="zoomFit" title="Fit" style="font-size:13px;font-weight:700">Fit</button>
      <button id="zoomIn" title="Zoom in">+</button>
    </div>
  </div>
</div>

<div class="flows" id="flows"></div>

<div class="stage">
  <div class="canvas" id="canvas">
    <div class="viewport" id="viewport">
      <svg class="wires" id="wires"></svg>
      <div class="token" id="token"></div>
      <!-- nodes injected here -->
    </div>
    <div class="hint" id="hint"><b>Tip:</b> watch it play, or click any step to learn more · drag to move · scroll to zoom</div>
    <div class="legend" id="legend"></div>
    <div class="caption" id="caption">
      <span class="cap-step" id="capStep">Step 1</span>
      <div class="cap-tx"><div class="cap-t" id="capT"></div><div class="cap-d" id="capD"></div></div>
    </div>
  </div>
</div>

<div class="scrim" id="scrim"></div>
<aside class="panel" id="panel">
  <div class="ph">
    <button class="close" id="pClose">×</button>
    <div class="pico" id="pIco"></div>
    <div class="pcat" id="pCat"></div>
    <h2 id="pTitle"></h2>
  </div>
  <div class="pb">
    <div class="sec what">
      <div class="sl"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>What happens here</div>
      <p id="pWhat"></p>
    </div>
    <div class="sec ex-wrap" id="pExWrap">
      <div class="sl"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>For example</div>
      <div class="ex" id="pEx"></div>
    </div>
  </div>
  <div class="pnav">
    <button id="pPrev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg> Previous</button>
    <button id="pNext">Next step <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></button>
  </div>
</aside>

<script>
// ====================== ICONS ======================
const ICON = {
  camera:'<path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/>',
  eye:'<path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/>',
  search:'<circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/>',
  shield:'<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/>',
  star:'<path d="M12 2l3 6.3 6.9 1-5 4.9 1.2 6.8L12 17.8 5.9 21l1.2-6.8-5-4.9 6.9-1z"/>',
  gift:'<path d="M20 12v9H4v-9"/><path d="M2 7h20v5H2z"/><path d="M12 22V7"/><path d="M12 7S11 2 8 2a2.5 2.5 0 0 0 0 5"/><path d="M12 7s1-5 4-5a2.5 2.5 0 0 1 0 5"/>',
  userCheck:'<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M16 11l2 2 4-4"/>',
  building:'<rect x="4" y="2" width="16" height="20" rx="2"/><path d="M9 22v-4h6v4M8 6h.01M12 6h.01M16 6h.01M8 10h.01M12 10h.01M16 10h.01M8 14h.01M12 14h.01M16 14h.01"/>',
  check:'<path d="M20 6L9 17l-5-5"/>',
  copy:'<rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>',
  gauge:'<path d="M12 14l4-4"/><path d="M3.5 18a9 9 0 1 1 17 0"/>',
  scale:'<path d="M12 3v18M5 7h14M7 7l-3 6h6zM17 7l-3 6h6z"/><path d="M3 21h18"/>',
  x:'<path d="M18 6L6 18M6 6l12 12"/>',
  coins:'<circle cx="8" cy="8" r="6"/><path d="M18.1 6.5a6 6 0 1 1-5.6 9.8"/><path d="M7 6h1v4M16.7 14h1v4"/>',
  trophy:'<path d="M8 21h8M12 17v4M7 4h10v5a5 5 0 0 1-10 0z"/><path d="M5 9a3 3 0 0 1 0-5h2M19 9a3 3 0 0 0 0-5h-2"/>',
  layers:'<path d="M12 2L2 7l10 5 10-5z"/><path d="M2 12l10 5 10-5M2 17l10 5 10-5"/>',
  megaphone:'<path d="M3 11v2a1 1 0 0 0 1 1h2l5 4V6L6 10H4a1 1 0 0 0-1 1z"/><path d="M15 8a4 4 0 0 1 0 8"/>',
  chart:'<path d="M3 3v18h18"/><rect x="7" y="11" width="3" height="7"/><rect x="12" y="7" width="3" height="11"/><rect x="17" y="13" width="3" height="5"/>',
  database:'<ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.7 4 3 9 3s9-1.3 9-3V5"/><path d="M3 12c0 1.7 4 3 9 3s9-1.3 9-3"/>',
  phone:'<rect x="6" y="2" width="12" height="20" rx="3"/><path d="M11 18h2"/>',
  doc:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M8 13h8M8 17h6"/>'
};
const CATNAME = {input:'Start',read:'Automatic',find:'Automatic',check:'Safety check',decide:'Decision',reward:'Reward',output:'Result',admin:'Viessmann',data:'Records'};
function svgIco(k){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+(ICON[k]||ICON.check)+'</svg>';}

// ====================== WORKFLOWS (plain language) ======================
const FLOWS = [
{ key:'journey', name:'The big picture',
  nodes:[
    {id:'u',col:0,row:1,cat:'input',icon:'camera',title:'Snap the invoice',sub:'photo, PDF or e-invoice',
      what:'The installer takes a photo of the wholesaler invoice — or uploads a PDF or e-invoice — right from their phone.',
      ex:'As easy as sending a photo in a chat. <b>Two taps and it’s in.</b>'},
    {id:'r',col:1,row:1,cat:'read',icon:'eye',title:'The app reads it',sub:'automatically · no typing',
      what:'The app reads the invoice text by itself. Nothing to type, and it works without any paid AI service.',
      ex:'It even reads a normal, slightly crooked phone photo — and the reading happens <b>on the phone itself</b>.'},
    {id:'f',col:2,row:1,cat:'find',icon:'search',title:'Finds the products',sub:'which items are Viessmann',
      what:'It picks out the Viessmann products on the invoice and quietly ignores everything else.',
      ex:'On a mixed invoice it spots the <b>Vitodens 200-W</b> boiler and skips the unrelated pipes and fittings.'},
    {id:'c',col:3,row:1,cat:'check',icon:'shield',title:'Checks it’s genuine',sub:'real & not reused',

// ====================== ENGINE ======================
const NW=230, NH=72, HG=104, VG=58, PAD=80;
const WF = {
  flow:null, nodes:[], byId:{}, scale:1, tx:0, ty:0,
  playing:false, idx:0, t1:null, t2:null, curNode:null,
  el:{},
  init(){
    this.el.canvas=document.getElementById('canvas');
    this.el.vp=document.getElementById('viewport');
    this.el.wires=document.getElementById('wires');
    this.el.token=document.getElementById('token');
    this.el.cap=document.getElementById('caption');
    this.el.capStep=document.getElementById('capStep');
    this.el.capT=document.getElementById('capT');
    this.el.capD=document.getElementById('capD');
    this.buildTabs(); this.buildLegend(); this.bindControls(); this.bindPan();
    this.load('journey');
  },
  buildTabs(){
    const f=document.getElementById('flows');
    f.innerHTML=FLOWS.map((w,i)=>`<button class="flow-tab" data-k="${w.key}"><span class="n">${i+1}</span>${w.name}</button>`).join('');
    f.querySelectorAll('.flow-tab').forEach(b=>b.onclick=()=>this.load(b.dataset.k));
  },
  buildLegend(){
    const cats=[['input','Start'],['read','Automatic'],['check','Safety check'],['decide','Decision'],['reward','Reward'],['admin','Viessmann'],['output','Result']];
    document.getElementById('legend').innerHTML='<div class="lt">What the colours mean</div>'+
      cats.map(([c,n])=>`<span class="li"><span class="sw" style="background:var(--c-${c})"></span>${n}</span>`).join('');
  },
  bindControls(){
    document.getElementById('playBtn').onclick=()=>this.togglePlay();
    document.getElementById('replayBtn').onclick=()=>{this.clearStates();this.startPlay();};
    document.getElementById('zoomIn').onclick=()=>this.zoomBy(1.2);
    document.getElementById('zoomOut').onclick=()=>this.zoomBy(1/1.2);
    document.getElementById('zoomFit').onclick=()=>this.fit();
    document.getElementById('pClose').onclick=()=>this.closePanel();
    document.getElementById('scrim').onclick=()=>this.closePanel();
    document.getElementById('pPrev').onclick=()=>this.panelStep(-1);
    document.getElementById('pNext').onclick=()=>this.panelStep(1);
    window.addEventListener('keydown',e=>{ if(e.key==='Escape')this.closePanel(); });
  },
  bindPan(){
    const c=this.el.canvas; let sx,sy,stx,sty,drag=false,moved=false;
    c.addEventListener('pointerdown',e=>{
      if(e.target.closest('.node'))return;
      drag=true;moved=false;sx=e.clientX;sy=e.clientY;stx=this.tx;sty=this.ty;c.classList.add('grab');c.setPointerCapture(e.pointerId);
    });
    c.addEventListener('pointermove',e=>{
      if(!drag)return; const dx=e.clientX-sx, dy=e.clientY-sy;
      if(Math.abs(dx)+Math.abs(dy)>3)moved=true;
      this.tx=stx+dx;this.ty=sty+dy;this.apply();
    });
    c.addEventListener('pointerup',e=>{drag=false;c.classList.remove('grab');});
    c.addEventListener('wheel',e=>{e.preventDefault();this.zoomAt(e.deltaY<0?1.12:1/1.12,e.clientX,e.clientY);},{passive:false});
  },
  load(key){
    const w=FLOWS.find(f=>f.key===key); if(!w)return;
    this.stopPlay();
    this.flow=w;
    document.querySelectorAll('.flow-tab').forEach(b=>b.classList.toggle('on',b.dataset.k===key));
    // layout
    this.nodes=w.nodes.map(n=>({...n,x:PAD+n.col*(NW+HG),y:PAD+n.row*(NH+VG)}));
    this.byId={}; this.nodes.forEach(n=>this.byId[n.id]=n);
    this.render();
    this.fit();
    // auto-play after a beat so it "shows playing"
    clearTimeout(this._auto); this._auto=setTimeout(()=>this.startPlay(),650);
  },
  render(){
    const vp=this.el.vp;
    vp.querySelectorAll('.node').forEach(n=>n.remove());
    // world size
    let maxX=0,maxY=0; this.nodes.forEach(n=>{maxX=Math.max(maxX,n.x+NW);maxY=Math.max(maxY,n.y+NH);});
    this.worldW=maxX+PAD; this.worldH=maxY+PAD;
    // wires
    const W=this.el.wires; W.setAttribute('width',this.worldW); W.setAttribute('height',this.worldH);
    let paths='';
    this.flow.edges.forEach(([a,b,o])=>{
      o=o||{}; const A=this.byId[a],B=this.byId[b]; if(!A||!B)return;
      const x1=A.x+NW,y1=A.y+NH/2,x2=B.x,y2=B.y+NH/2;
      const dx=Math.max(40,(x2-x1)*0.5);
      const d=`M${x1},${y1} C${x1+dx},${y1} ${x2-dx},${y2} ${x2},${y2}`;
      paths+=`<path class="wire${o.dashed?' dashed':''}" data-a="${a}" data-b="${b}" d="${d}"/>`;
      if(o.lbl){const mx=(x1+x2)/2,my=(y1+y2)/2;
        paths+=`<rect class="wire-lbl-bg" x="${mx-o.lbl.length*3.4-6}" y="${my-9}" width="${o.lbl.length*6.8+12}" height="18" rx="9"/>`;
        paths+=`<text class="wire-lbl" x="${mx}" y="${my+4}" text-anchor="middle">${o.lbl}</text>`;}
    });
    W.innerHTML=paths;
    // nodes
    this.nodes.forEach((n,i)=>{
      const stepNo=this.flow.happy.indexOf(n.id);
      const d=document.createElement('div');
      d.className='node'; d.dataset.id=n.id; d.dataset.cat=n.cat;
      d.style.left=n.x+'px'; d.style.top=n.y+'px';
      d.innerHTML=(stepNo>=0?`<span class="step-badge">${stepNo+1}</span>`:'')+
        `<div class="ico">${svgIco(n.icon)}</div><div class="tx"><div class="tt">${n.title}</div><div class="ss">${n.sub}</div></div>`;
      d.onclick=(e)=>{e.stopPropagation();this.openPanel(n.id);};
      vp.appendChild(d);
    });
    this.nodeEls={}; vp.querySelectorAll('.node').forEach(el=>this.nodeEls[el.dataset.id]=el);
  },
  apply(){ this.el.vp.style.transform=`translate(${this.tx}px,${this.ty}px) scale(${this.scale})`; },
  fit(){
    const r=this.el.canvas.getBoundingClientRect();
    const cw=r.width||window.innerWidth, ch=(r.height||window.innerHeight)-40;
    const s=Math.min(cw/this.worldW, ch/this.worldH, 1.15)*0.94;
    this.scale=s;
    this.tx=(cw-this.worldW*s)/2;
    this.ty=Math.max(20,(ch-this.worldH*s)/2)+ (r.height? 0:0);
    this.apply();
  },
  zoomBy(f){ this.scale=Math.min(2.2,Math.max(.3,this.scale*f)); this.apply(); },
  zoomAt(f,cx,cy){
    const r=this.el.canvas.getBoundingClientRect();
    const px=cx-r.left, py=cy-r.top;
    const ns=Math.min(2.2,Math.max(.3,this.scale*f));
    const k=ns/this.scale;
    this.tx=px-(px-this.tx)*k; this.ty=py-(py-this.ty)*k; this.scale=ns; this.apply();
  },
  // ---------- play ----------
  togglePlay(){ if(this.playing)this.stopPlay(); else { if(this.idx>=this.flow.happy.length)this.clearStates(); this.startPlay(); } },
  setPlayBtn(p){ document.getElementById('playBtn').innerHTML=p
    ?'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg><span class="lbl">Pause</span>'
    :'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg><span class="lbl">Play</span>'; },
  startPlay(){ if(!this.flow)return; this.playing=true; this.setPlayBtn(true);
    if(this.idx>=this.flow.happy.length)this.idx=0; this.el.token.classList.add('show'); this.tick(); },
  stopPlay(){ this.playing=false; this.setPlayBtn(false); clearTimeout(this.t1); clearTimeout(this.t2); },
  clearStates(){ this.idx=0; Object.values(this.nodeEls||{}).forEach(el=>el.classList.remove('on','done','dim'));
    this.el.wires.querySelectorAll('.wire').forEach(w=>w.classList.remove('flow'));
    this.el.cap.classList.remove('show'); this.el.token.classList.remove('show'); },
  tick(){
    const h=this.flow.happy;
    if(this.idx>=h.length){ // finished — pause then loop
      this.t1=setTimeout(()=>{ if(!this.playing)return; this.clearStates(); this.el.token.classList.add('show'); this.tick(); },1900);
      return;
    }
    const id=h[this.idx]; const n=this.byId[id]; const el=this.nodeEls[id];
    // mark previous done, flow wire from prev
    if(this.idx>0){ const prev=h[this.idx-1]; this.nodeEls[prev]&&this.nodeEls[prev].classList.replace('on','done');
      const w=this.el.wires.querySelector(`.wire[data-a="${prev}"][data-b="${id}"]`); w&&w.classList.add('flow'); }
    // move token to node centre
    this.el.token.style.left=(n.x+NW/2)+'px'; this.el.token.style.top=(n.y+NH/2)+'px';
    el&&el.classList.add('on');
    // caption
    this.el.capStep.textContent=`Step ${this.idx+1} of ${h.length}`;
    this.el.capT.textContent=n.title;
    this.el.capD.textContent=n.what;
    this.el.cap.classList.add('show');
    this.idx++;
    this.t2=setTimeout(()=>{ if(this.playing)this.tick(); }, this.idx===1?900:1500);
  },
  // ---------- detail panel ----------
  openPanel(id){
    this.stopPlay();
    const n=this.byId[id]; if(!n)return; this.panelId=id;
    const cc=getComputedStyle(document.documentElement).getPropertyValue('--c-'+n.cat).trim();
    const bb=getComputedStyle(document.documentElement).getPropertyValue('--b-'+n.cat).trim();
    const pico=document.getElementById('pIco'); pico.style.background=bb; pico.style.color=cc; pico.innerHTML=svgIco(n.icon);
    const pcat=document.getElementById('pCat'); pcat.textContent=CATNAME[n.cat]||''; pcat.style.color=cc;
    document.getElementById('pTitle').textContent=n.title;
    document.getElementById('pWhat').textContent=n.what;
    const exWrap=document.getElementById('pExWrap');
    if(n.ex){ exWrap.style.display=''; document.getElementById('pEx').innerHTML=n.ex; } else exWrap.style.display='none';
    // highlight on canvas
    Object.values(this.nodeEls).forEach(el=>el.classList.remove('on','dim'));
    Object.values(this.nodeEls).forEach(el=>{ if(el.dataset.id!==id)el.classList.add('dim'); });
    this.nodeEls[id].classList.add('on'); this.nodeEls[id].classList.remove('dim');
    // prev/next within happy path
    const hi=this.flow.happy.indexOf(id);
    document.getElementById('pPrev').disabled = hi<=0;
    document.getElementById('pNext').disabled = hi<0 || hi>=this.flow.happy.length-1;
    document.getElementById('scrim').classList.add('open');
    document.getElementById('panel').classList.add('open');
  },
  panelStep(dir){
    const hi=this.flow.happy.indexOf(this.panelId); if(hi<0)return;
    const ni=hi+dir; if(ni<0||ni>=this.flow.happy.length)return;
    this.openPanel(this.flow.happy[ni]);
  },
  closePanel(){
    document.getElementById('scrim').classList.remove('open');
    document.getElementById('panel').classList.remove('open');
    Object.values(this.nodeEls||{}).forEach(el=>el.classList.remove('dim'));
  }
};
window.addEventListener('resize',()=>{ if(WF.flow)WF.fit(); });
WF.init();
</script>
